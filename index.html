<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YADO OSAKA — 大阪の貸切民泊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #e4edf3;
  --bg2:     #d6e3ec;
  --card:    #edf3f7;
  --card2:   #f5f8fa;
  --accent:  #6a97b4;
  --accent2: #42748f;
  --accent3: #254f66;
  --muted:   #8aafc4;
  --text:    #1a3345;
  --text2:   #466070;
  --text3:   #7a9fba;
  --border:  rgba(66,116,143,0.18);
  --r:       16px;
  --rs:      10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans JP','Noto Sans SC','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);}

/* HEADER */
header{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:2.5rem 2rem 2rem;
  text-align:center;
  position:relative;overflow:hidden;
}
header::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(-45deg,transparent,transparent 30px,rgba(106,151,180,0.06) 30px,rgba(106,151,180,0.06) 31px);
  pointer-events:none;
}
.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2.4rem,6vw,3.6rem);
  font-weight:600;letter-spacing:0.2em;
  color:var(--accent3);position:relative;line-height:1;
}
.logo-sub{font-size:.75rem;letter-spacing:.35em;color:var(--muted);margin-top:8px;font-weight:500;position:relative;}
.header-desc{margin-top:14px;font-size:.85rem;color:var(--text2);line-height:1.9;position:relative;}

/* LANG SWITCHER */
.lang-bar{
  display:flex;justify-content:center;gap:6px;
  padding:10px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  position:relative;
}
.lang-btn{
  padding:5px 14px;
  font-size:.78rem;font-weight:700;
  border:1px solid var(--border);
  border-radius:20px;
  background:transparent;
  color:var(--text2);
  cursor:pointer;
  transition:all .16s;
  font-family:inherit;
}
.lang-btn:hover{background:rgba(106,151,180,.15);color:var(--accent3);}
.lang-btn.active{background:var(--accent2);color:#fff;border-color:var(--accent2);}

main{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem;}

/* MAP LAYOUT */
.map-layout{
  display:grid;grid-template-columns:300px 1fr;
  gap:1.5rem;align-items:start;
}
@media(max-width:720px){.map-layout{grid-template-columns:1fr;}}

.pin-list{display:flex;flex-direction:column;gap:10px;}

.pin-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:14px 16px;
  cursor:pointer;transition:all .16s;position:relative;
}
.pin-card:hover{border-color:var(--accent);background:var(--card2);}
.pin-card.active{border:2px solid var(--accent2);background:var(--card2);}
.badge-coming{
  position:absolute;top:10px;right:12px;
  font-size:.68rem;padding:2px 8px;border-radius:20px;
  background:#fdf2dc;color:#8a6520;border:1px solid #f0d898;
}
.pin-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.pin-num{
  width:28px;height:28px;border-radius:50%;
  background:var(--accent2);color:#fff;
  font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.pin-card.active .pin-num{background:var(--accent3);}
.pin-name{font-size:.85rem;font-weight:700;color:var(--text);line-height:1.3;}
.pin-area{font-size:.73rem;color:var(--text3);margin-top:1px;}
.pin-tags{display:flex;flex-wrap:wrap;gap:5px;margin-left:38px;}
.tag{font-size:.7rem;padding:2px 9px;border-radius:20px;background:var(--bg2);color:var(--text2);border:1px solid var(--border);}
.tag.hi{background:#d6e8f3;color:var(--accent3);border-color:#b0cfe0;}

.map-panel{position:sticky;top:1rem;}
.map-frame-wrap{
  border-radius:var(--r);overflow:hidden;
  border:1px solid var(--border);background:var(--bg2);
}
.map-frame-wrap iframe{width:100%;height:380px;border:none;display:block;}
.map-placeholder{
  width:100%;height:380px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;color:var(--text3);font-size:.82rem;
}

.detail-box{
  margin-top:1rem;background:var(--card);
  border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;
}
.detail-box h3{font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:5px;}
.detail-box p{font-size:.78rem;color:var(--text2);line-height:1.8;margin-bottom:12px;}
.airbnb-btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  width:100%;padding:10px;background:#FF5A5F;color:#fff;
  border:none;border-radius:var(--rs);font-size:.82rem;font-weight:700;
  cursor:pointer;text-decoration:none;font-family:inherit;
  transition:background .15s;
}
.airbnb-btn:hover{background:#e04f54;}
.insta-btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  width:100%;padding:9px;margin-top:8px;
  background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
  color:#fff;border:none;border-radius:var(--rs);font-size:.82rem;font-weight:700;
  cursor:pointer;text-decoration:none;font-family:inherit;
  transition:opacity .15s;
}
.insta-btn:hover{opacity:.88;}



/* PIN CARD PHOTO BG */
.pin-card.has-photo{
  background-size:cover;background-position:center;
  border:1px solid var(--border);
  position:relative;overflow:hidden;
  min-height:100px;
}
.pin-card.has-photo::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom, rgba(26,51,69,0.45) 0%, rgba(26,51,69,0.72) 100%);
  z-index:0;
}
.pin-card.has-photo .pin-head,
.pin-card.has-photo .pin-tags{position:relative;z-index:1;}
.pin-card.has-photo .pin-name{color:#fff;}
.pin-card.has-photo .pin-area{color:rgba(255,255,255,0.75);}
.pin-card.has-photo .pin-num{background:rgba(255,255,255,0.25);border:1.5px solid rgba(255,255,255,0.5);}
.pin-card.has-photo.active .pin-num{background:rgba(255,255,255,0.4);}
.pin-card.has-photo .tag{background:rgba(255,255,255,0.18);color:#fff;border-color:rgba(255,255,255,0.3);}
.pin-card.has-photo .tag.hi{background:rgba(106,151,180,0.55);color:#fff;border-color:rgba(106,151,180,0.5);}
.pin-card.has-photo .badge-coming{background:rgba(253,242,220,0.9);}

footer{
  text-align:center;padding:2rem 1rem;font-size:.72rem;
  color:var(--text3);border-top:1px solid var(--border);background:var(--bg2);
}
</style>
</head>

    快適に過ごせるよう、心を込めてお迎えします。<br>
    予約方法や日程の相談もお気軽に♪

const URLS = [
  'https://airbnb.jp/h/yado-tanimachi',
  'https://airbnb.jp/h/yado-minamihorie',
  'https://airbnb.jp/h/yado-tsuruhashi',
  'https://airbnb.jp/h/yado-haginochaya2f',
  'https://airbnb.jp/h/yado-haginochaya3f'
];

const INSTAS = [
  'https://www.instagram.com/yado_tanimachi01',
  'https://www.instagram.com/yado_minamihorie02',
  'https://www.instagram.com/yado_tsuruhashi03',
  'https://www.instagram.com/yado_haginochaya2f04',
  'https://www.instagram.com/yado_haginochaya3f05'
];

const EMBEDS = [
  EMBED.tanimachi,
  EMBED.minamihorie,
  EMBED.tsuruhashi,
  EMBED.hagi,
  EMBED.hagi
];

const COMING = [false, false, false, false, false];

let currentLang = 'ja';
let currentPin = 0;

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach((b, i) => {
    b.classList.toggle('active', ['ja','en','zh','ko'][i] === lang);
  });
  renderAll();
}

function renderAll() {
  const L = LANGS[currentLang];
  document.getElementById('h-sub').textContent = L.sub;
  document.getElementById('h-desc').innerHTML = L.desc;
  document.getElementById('footer').textContent = L.footer;


  L.props.forEach((p, i) => {
    document.getElementById('area-' + i).textContent = p.area;
    const tagsEl = document.getElementById('tags-' + i);
    tagsEl.innerHTML = p.tags.map((t, j) => `<span class="tag${j===0?' hi':''}">${t}</span>`).join('');
  });

  updateDetail(currentPin);
}

function updateDetail(i) {
  const L = LANGS[currentLang];
  const p = L.props[i];
  document.getElementById('d-name').textContent = ['YADO TANIMACHI','YADO MINAMIHORIE','YADO TSURUHASHI','YADO HAGINOCHAYA 2F','YADO HAGINOCHAYA 3F'][i];
  document.getElementById('d-desc').textContent = p.desc;
  const lnk = document.getElementById('d-link');
  lnk.href = URLS[i];
  lnk.textContent = COMING[i] ? L.detail : L.book;
  const insta = document.getElementById('d-insta');
  if (INSTAS[i]) {
    insta.href = INSTAS[i];
    insta.style.display = 'flex';
  } else {
    insta.style.display = 'none';
  }
}

function renderMapFrame(src) {
  const wrap = document.getElementById('map-frame-wrap');
  if (src) {
    wrap.innerHTML = `<iframe src="${src}" loading="lazy" referrerpolicy="no-referrer-when-downgrade" allowfullscreen></iframe>`;
  } else {
    wrap.innerHTML = `<div class="map-placeholder"><span>🗺</span><span>Coming soon</span></div>`;
  }
}

function selectPin(i) {
  currentPin = i;
  document.querySelectorAll('.pin-card').forEach((c, j) => c.classList.toggle('active', j === i));
  renderMapFrame(EMBEDS[i]);
  updateDetail(i);
}

// 初期化
renderAll();
selectPin(0);
</script>
